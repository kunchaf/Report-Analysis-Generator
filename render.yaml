services:
  # ── Backend API ──────────────────────────────────────────────
  - type: web
    name: raig-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # set manually in Render dashboard
      - key: PYTHON_VERSION
        value: "3.11.0"

  # ── Frontend Static Site ──────────────────────────────────────
  - type: web
    name: raig-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false          # set to your backend URL in Render dashboard
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
