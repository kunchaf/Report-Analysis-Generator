services:
  - type: web
    name: raig-app
    runtime: python
    buildCommand: |
      pip install -r backend/requirements.txt &&
      cd frontend && npm install && npm run build
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --app-dir backend
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: VITE_API_URL
        value: ""
